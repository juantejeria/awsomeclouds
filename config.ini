[detection]
# Umbral de confianza para considerar un animal como "conocido"
# Si la probabilidad máxima es menor que este valor, se considera "animal desconocido"
confidence_threshold=0.5
# Mensaje para animales desconocidos
unknown_animal_message=Animal Desconocido - No está en la base de datos
[calibracion]
# ÚNICA fuente de verdad para las constantes de calibración del sistema.
# Las lee core/calibracion.py y de ahí las consumen backend y frontend.

# Altura real de la vara/cinta roja de referencia, en cm.
# Define la escala px→cm de TODAS las mediciones.
vara_cm = 110

# Ratio profundidad/altura del corte elíptico del barril (modelo 3D).
# El semi-eje de profundidad de cada rebanada = alto_rebanada * k_depth.
k_depth = 0.25

# Densidad del animal en kg por litro: peso_kg = volumen_L * densidad_kg_l
densidad_kg_l = 1.03
